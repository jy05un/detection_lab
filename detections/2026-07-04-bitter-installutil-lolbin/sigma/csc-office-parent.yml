title: .NET Compiler csc.exe Spawned By Office Or Script Host
id: e6002e36-3aa5-4316-8698-79d87337c121
status: experimental
description: >
    Detects on-host C# compilation via csc.exe with an Office application or
    script host parent, indicating source-code drop-and-compile evasion.
references:
    - https://ti.qianxin.com/blog/category/事件追踪/
    - https://attack.mitre.org/techniques/T1027/004/
author: jy05un
date: 2026/07/04
tags:
    - attack.defense-evasion
    - attack.t1027.004
    - attack.execution
    - attack.t1059.005
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        Image|endswith: '\csc.exe'
        ParentImage|endswith:
            - '\WINWORD.EXE'
            - '\EXCEL.EXE'
            - '\POWERPNT.EXE'
            - '\wscript.exe'
            - '\cscript.exe'
            - '\mshta.exe'
    condition: selection
falsepositives:
    - Developer workstations building .NET projects (scope out by host role)
level: high
