title: InstallUtil Proxy Execution With Uninstall/Silent Flags
id: e3bda3ac-274d-425a-85a6-13b6e2d0e1b6
status: experimental
description: >
    Detects InstallUtil.exe used as a proxy execution LOLBin with the
    /logfile= /LogToConsole=false /U flag combination, as seen in BITTER
    (蔓灵花 / APT-Q-37) C# backdoor chains.
references:
    - https://ti.qianxin.com/blog/category/事件追踪/
    - https://lolbas-project.github.io/lolbas/Binaries/Installutil/
    - https://attack.mitre.org/techniques/T1218/004/
author: jy05un
date: 2026/07/04
tags:
    - attack.defense-evasion
    - attack.t1218.004
logsource:
    category: process_creation
    product: windows
detection:
    selection_img:
        - Image|endswith: '\InstallUtil.exe'
        - OriginalFileName: 'InstallUtil.exe'
    selection_flags:
        CommandLine|contains|all:
            - 'logfile='
            - 'LogToConsole=false'
            - '/U'
    condition: selection_img and selection_flags
falsepositives:
    - Rare legitimate installers invoking uninstall routines
level: high
