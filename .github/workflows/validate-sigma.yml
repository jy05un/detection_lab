name: validate-sigma

on:
  push:
    paths:
      - 'detections/**/sigma/*.yml'
      - '.github/workflows/validate-sigma.yml'
  pull_request:
    paths:
      - 'detections/**/sigma/*.yml'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install pyyaml

      - name: Validate Sigma rules
        run: python .github/scripts/validate_sigma.py
